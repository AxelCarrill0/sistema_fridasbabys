{% extends "home/base_cliente.html" %}

{% block contenido %}
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h3 class="fw-bold mb-1">Pago Seguro con Tarjeta</h3>
                        <p class="text-muted mb-0">Verificación facial obligatoria</p>
                        <div class="divider mx-auto mt-3"></div>
                    </div>

                    <div class="text-center mb-4">
                        <div class="total-box mx-auto">
                            <span>Total a pagar</span>
                            <strong class="fs-3 d-block">${{ pago.total|floatformat:2 }}</strong>
                        </div>
                    </div>

                    <form method="post" id="form-pago-tarjeta">
                        {% csrf_token %}
                        <input type="hidden" name="rostro_verificacion" id="rostro_data">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Titular de la tarjeta</label>
                            <input type="text" id="titular" class="form-control form-control-lg" placeholder="Nombre completo" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Número de tarjeta</label>
                            <input type="text" id="n_tarjeta" class="form-control form-control-lg" placeholder="**** **** **** ****" maxlength="16" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Vencimiento</label>
                                <input type="text" id="vence" class="form-control form-control-lg" placeholder="MM/AA" maxlength="5" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">CVV</label>
                                <input type="password" id="cvv" class="form-control form-control-lg" placeholder="***" maxlength="3" required>
                            </div>
                        </div>

                        <button type="button"
                                id="btn-iniciar-proceso"
                                class="btn btn-secondary w-100 py-3 rounded-3 fw-bold mt-3"
                                onclick="validarYAbrirCamara()" disabled>
                            ⏳ Cargando sistema de seguridad...
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<div id="modal-facial" class="modal-facial-overlay" style="display:none;">
    <div class="modal-facial-content">

        <h4 class="fw-bold mb-1">Escaneo Facial</h4>
        <p class="text-muted small mb-3">Mire fijamente a la cámara</p>

        <div class="video-container">
            <video id="video" autoplay muted playsinline></video>
            <div class="face-guide"></div>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div id="scan-status" class="mt-3 fw-bold text-warning">
            Iniciando cámara...
        </div>

        <p id="timer-text" class="text-muted small mt-1">Tiempo restante: 20s</p>

        <div class="d-flex flex-column gap-2 mt-4">
            <button class="btn btn-success fw-bold py-2" id="btn-capturar" disabled>
                📸 Confirmar Rostro
            </button>

            <button class="btn btn-light" onclick="cancelarVerificacion()">
                Cancelar operación
            </button>
        </div>

    </div>
</div>

<style>
/* Estilos visuales */
.divider { width: 70px; height: 4px; background: linear-gradient(90deg, #1d3557, #2a9d8f); border-radius: 10px; }
.total-box { background: #f8f9fa; border-radius: 16px; padding: 18px 28px; display: inline-block; box-shadow: inset 0 0 0 1px #e0e0e0; }

/* Modal Styles */
.modal-facial-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
.modal-facial-content { background: #fff; padding: 2rem; border-radius: 25px; width: 90%; max-width: 420px; text-align: center; position: relative; }

/* Video Circular */
.video-container { position: relative; width: 260px; height: 260px; margin: 0 auto; border-radius: 50%; overflow: hidden; border: 5px solid #ccc; transition: 0.3s; background-color: #000; }
#video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); } /* Efecto espejo */

/* Estados del borde */
.border-scanning { border-color: #ffc107 !important; }
.border-success-active { border-color: #198754 !important; box-shadow: 0 0 20px rgba(25,135,84,0.6); }

/* Guía visual */
.face-guide { position: absolute; inset: 15%; border: 2px dashed rgba(255,255,255,0.7); border-radius: 50%; z-index: 10; pointer-events: none; }
</style>

<script>
let stream = null;
let model = null;
let isDetecting = false;
let timeoutID = null;
let countdownInterval = null;

// Elementos del DOM
const video = document.getElementById('video');
const modal = document.getElementById('modal-facial');
const btnCapturar = document.getElementById('btn-capturar');
const scanStatus = document.getElementById('scan-status');
const videoContainer = document.querySelector('.video-container');
const btnIniciar = document.getElementById('btn-iniciar-proceso');
const timerText = document.getElementById('timer-text');

// 1. Cargar modelo BlazeFace al inicio
async function loadFaceModel() {
    try {
        console.log("Cargando modelo...");
        model = await blazeface.load();
        console.log("Modelo cargado.");

        // Habilitar botón de pago
        btnIniciar.disabled = false;
        btnIniciar.classList.remove('btn-secondary');
        btnIniciar.classList.add('btn-primary');
        btnIniciar.innerHTML = "🔒 Verificar identidad y pagar";
    } catch (err) {
        console.error("Error cargando modelo:", err);
        alert("Error al cargar sistema de seguridad. Recargue la página.");
    }
}
loadFaceModel();

// 2. Validar formulario antes de abrir cámara
function validarYAbrirCamara() {
    const campos = ['titular','n_tarjeta','vence','cvv'];
    let ok = true;
    campos.forEach(id => {
        const el = document.getElementById(id);
        if(!el.value.trim()){ el.classList.add('is-invalid'); ok=false; }
        else el.classList.remove('is-invalid');
    });

    if(!ok) return alert("Por favor, complete todos los datos de la tarjeta.");

    abrirModalCamara();
}

// 3. Abrir cámara y temporizadores
async function abrirModalCamara() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 400, height: 400, facingMode: "user" }
        });
        video.srcObject = stream;

        // Esperar a que el video tenga metadata para empezar a detectar
        video.onloadedmetadata = () => {
            video.play();
            modal.style.display = 'flex';
            isDetecting = true;
            detectFaceLoop(); // Iniciar bucle de IA
            iniciarTemporizadorCancelacion(); // Iniciar cuenta regresiva de 20s
        };

    } catch (err) {
        alert("No se pudo acceder a la cámara. Verifique los permisos.");
        console.error(err);
    }
}

// 4. Temporizador de 20 segundos (Cuenta regresiva)
function iniciarTemporizadorCancelacion() {
    let timeLeft = 20;
    timerText.textContent = `Tiempo restante: ${timeLeft}s`;

    // Intervalo visual (cada segundo)
    countdownInterval = setInterval(() => {
        timeLeft--;
        timerText.textContent = `Tiempo restante: ${timeLeft}s`;
        if (timeLeft <= 5) timerText.classList.add('text-danger');
    }, 1000);

    // Timeout funcional (a los 20 segundos cierra todo)
    timeoutID = setTimeout(() => {
        cancelarVerificacion("Tiempo agotado. No se detectó un rostro válido.");
    }, 20000);
}

// 5. Bucle de Detección Facial (Loop infinito hasta detectar o cancelar)
async function detectFaceLoop() {
    if (!isDetecting || !model) return;

    // Predicción de BlazeFace
    const predictions = await model.estimateFaces(video, false);

    if (predictions.length > 0) {
        // --- ROSTRO ENCONTRADO ---
        scanStatus.textContent = "¡Rostro verificado!";
        scanStatus.className = "mt-3 fw-bold text-success";

        videoContainer.classList.remove('border-scanning');
        videoContainer.classList.add('border-success-active');

        // HABILITAR BOTÓN DE CAPTURA
        btnCapturar.disabled = false;

    } else {
        // --- NO HAY ROSTRO ---
        scanStatus.textContent = "Buscando rostro...";
        scanStatus.className = "mt-3 fw-bold text-warning";

        videoContainer.classList.remove('border-success-active');
        videoContainer.classList.add('border-scanning');

        // DESHABILITAR BOTÓN DE CAPTURA
        btnCapturar.disabled = true;
    }

    // Volver a ejecutar en el siguiente frame
    if (isDetecting) {
        requestAnimationFrame(detectFaceLoop);
    }
}

// 6. Capturar foto y enviar formulario
btnCapturar.onclick = () => {
    isDetecting = false; // Detener IA
    limpiarTemporizadores();

    // Dibujar video en canvas
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 400;
    canvas.height = 400;

    // Dibujar imagen (espejada si es necesario, o normal)
    ctx.drawImage(video, 0, 0, 400, 400);

    // Guardar en input hidden
    const dataURL = canvas.toDataURL('image/jpeg', 0.8);
    document.getElementById('rostro_data').value = dataURL;

    // Detener cámara
    detenerCamara();

    // Enviar formulario al backend
    document.getElementById('form-pago-tarjeta').submit();
};

// 7. Funciones de limpieza y cierre
function detenerCamara() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
}

function limpiarTemporizadores() {
    clearTimeout(timeoutID);
    clearInterval(countdownInterval);
}

function cancelarVerificacion(mensaje = null) {
    isDetecting = false;
    detenerCamara();
    limpiarTemporizadores();
    modal.style.display = 'none';

    if (mensaje) {
        alert(mensaje);
        // Opcional: Redirigir si quieres sacar al usuario de la pantalla de pago
        // window.location.href = "{% url 'pagos:detalle_pago' pago.id %}";
    }
}
</script>
{% endblock %}
