{% extends "home/base_cliente.html" %}

{% block contenido %}
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h3 class="fw-bold mb-1">Pago Seguro con Tarjeta</h3>
                        <p class="text-muted mb-0">
                            Verificación facial obligatoria
                        </p>
                        <div class="divider mx-auto mt-3"></div>
                    </div>

                    <div class="text-center mb-4">
                        <div class="total-box mx-auto">
                            <span>Total a pagar</span>
                            <strong class="fs-3 d-block">
                                ${{ pago.total|floatformat:2 }}
                            </strong>
                        </div>
                    </div>

                    <form method="post" id="form-pago-tarjeta">
                        {% csrf_token %}
                        <input type="hidden" name="rostro_verificacion" id="rostro_data">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Titular de la tarjeta</label>
                            <input type="text" id="titular" class="form-control form-control-lg" placeholder="Nombre completo" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Número de tarjeta</label>
                            <input type="text" id="n_tarjeta" class="form-control form-control-lg" placeholder="**** **** **** ****" maxlength="16" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Vencimiento</label>
                                <input type="text" id="vence" class="form-control form-control-lg" placeholder="MM/AA" maxlength="5" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">CVV</label>
                                <input type="password" id="cvv" class="form-control form-control-lg" placeholder="***" maxlength="3" required>
                            </div>
                        </div>

                        <button type="button"
                                class="btn btn-primary w-100 py-3 rounded-3 fw-bold mt-3"
                                onclick="validarYAbrirCamara()">
                            🔒 Verificar identidad y pagar
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- MODAL FACIAL -->
<div id="modal-facial" class="modal-facial-overlay" style="display:none;">
    <div class="modal-facial-content">

        <h4 class="fw-bold mb-1">Escaneo Facial</h4>
        <p class="text-muted small mb-3">
            Alinea tu rostro dentro del círculo
        </p>

        <div class="video-container">
            <video id="video" autoplay muted playsinline></video>
            <div class="face-guide"></div>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div id="scan-status" class="mt-3 fw-bold text-danger">
            Cargando cámara...
        </div>

        <div class="d-flex flex-column gap-2 mt-4">
            <button class="btn btn-success fw-bold" id="btn-capturar" disabled>
                Confirmar rostro
            </button>

            <button class="btn btn-outline-warning btn-sm"
                    id="btn-ayuda"
                    style="display:none;"
                    onclick="forzarHabilitacion()">
                Captura manual
            </button>

            <button class="btn btn-light" onclick="cerrarModal()">
                Cancelar
            </button>
        </div>

    </div>
</div>

<style>
.divider {
    width: 70px;
    height: 4px;
    background: linear-gradient(90deg, #1d3557, #2a9d8f);
    border-radius: 10px;
}

.total-box {
    background: #f8f9fa;
    border-radius: 16px;
    padding: 18px 28px;
    display: inline-block;
    box-shadow: inset 0 0 0 1px #e0e0e0;
}

.modal-facial-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
}

.modal-facial-content {
    background: #fff;
    padding: 2rem;
    border-radius: 25px;
    width: 90%;
    max-width: 420px;
    text-align: center;
}

.video-container {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto;
    border-radius: 50%;
    overflow: hidden;
    border: 5px solid #dc3545;
    transition: 0.3s;
}

#video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
}

.face-guide {
    position: absolute;
    inset: 12%;
    border: 2px dashed rgba(255,255,255,0.6);
    border-radius: 50%;
}

.border-success-active {
    border-color: #198754 !important;
    box-shadow: 0 0 18px rgba(25,135,84,0.5);
}
</style>

<script>
let stream, model, isDetecting = false, detectTimer;
const modal = document.getElementById('modal-facial');
const video = document.getElementById('video');
const btnCapturar = document.getElementById('btn-capturar');
const btnAyuda = document.getElementById('btn-ayuda');
const scanStatus = document.getElementById('scan-status');
const videoContainer = document.querySelector('.video-container');

async function loadFaceModel() {
    model = await blazeface.load();
}
loadFaceModel();

function validarYAbrirCamara() {
    const campos = ['titular','n_tarjeta','vence','cvv'];
    let ok = true;

    campos.forEach(id => {
        const el = document.getElementById(id);
        if(!el.value.trim()){ el.classList.add('is-invalid'); ok=false; }
        else el.classList.remove('is-invalid');
    });

    if(!ok) return alert("Complete todos los datos de la tarjeta.");
    iniciarVerificacion();
}

async function iniciarVerificacion() {
    stream = await navigator.mediaDevices.getUserMedia({ video:{ width:640, height:480 } });
    video.srcObject = stream;

    modal.style.display = 'flex';
    isDetecting = true;
    detectFace();

    detectTimer = setTimeout(() => {
        if(isDetecting) btnAyuda.style.display = 'block';
    }, 8000);
}

async function detectFace() {
    if(!isDetecting) return;

    const predictions = await model.estimateFaces(video, false);
    if(predictions.length > 0){
        scanStatus.textContent = "Rostro detectado";
        scanStatus.className = "mt-3 fw-bold text-success";
        videoContainer.classList.add('border-success-active');
        btnCapturar.disabled = false;
        btnAyuda.style.display = 'none';
    } else {
        scanStatus.textContent = "Buscando rostro...";
        scanStatus.className = "mt-3 fw-bold text-danger";
        videoContainer.classList.remove('border-success-active');
        btnCapturar.disabled = true;
    }
    requestAnimationFrame(detectFace);
}

function forzarHabilitacion(){
    btnCapturar.disabled = false;
    scanStatus.textContent = "Modo manual activo";
}

btnCapturar.onclick = () => {
    isDetecting = false;
    clearTimeout(detectTimer);

    const canvas = document.getElementById('canvas');
    canvas.width = 400; canvas.height = 400;
    canvas.getContext('2d').drawImage(video,0,0,400,400);
    document.getElementById('rostro_data').value = canvas.toDataURL();

    stream.getTracks().forEach(t=>t.stop());
    document.getElementById('form-pago-tarjeta').submit();
};

function cerrarModal(){
    isDetecting = false;
    clearTimeout(detectTimer);
    if(stream) stream.getTracks().forEach(t=>t.stop());
    modal.style.display = 'none';
    btnAyuda.style.display = 'none';
}
</script>
{% endblock %}
