{% extends "home/base.html" %}
{% block contenido %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">

<div class="container mt-5">
    <div class="card profile-card mx-auto">
        <h2 class="profile-title text-center mb-4">
            <span class="icon-circle">
                <i class="fa-solid fa-user"></i>
            </span>
            Mi Perfil
        </h2>

        <div class="text-center mb-4">
            {% if user.foto_perfil %}
                <img src="{{ user.foto_perfil.url }}" id="img-perfil" class="profile-img">
            {% else %}
                <i class="fa-solid fa-circle-user fa-8x text-secondary"></i>
            {% endif %}
        </div>

        <button id="btn-activar-cambio" class="btn btn-main w-100" onclick="mostrarModal()">
            <i class="fa-solid fa-camera"></i> Cambiar foto de perfil
        </button>

        <form id="form-foto" method="post" enctype="multipart/form-data" class="mt-4" style="display:none;">
            {% csrf_token %}

            <label class="form-label fw-semibold">Selecciona una imagen</label>
            <input type="file" id="input-archivo" class="form-control mb-3" accept="image/*" required>

            <div class="preview-container" id="wrapper-crop">
                <img id="image-to-crop">
            </div>

            <input type="hidden" name="foto_perfil_base64" id="foto-recortada-data">

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success flex-grow-1">
                    <i class="fa-solid fa-check"></i> Guardar foto
                </button>
                <button type="button" class="btn btn-secondary flex-grow-1" onclick="location.reload()">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>

<div id="modal-pass" class="custom-modal">
    <div class="modal-box">
        <div class="modal-icon">
            <i class="fa-solid fa-lock"></i>
        </div>

        <h4 class="fw-bold text-center mb-2">Confirmar identidad</h4>
        <p class="text-muted text-center mb-3">
            Ingresa tu contraseña para continuar
        </p>

        <input type="password" id="confirm-pass" class="form-control mb-3" placeholder="Contraseña actual">

        <button class="btn btn-danger w-100 mb-2" onclick="validarPassword()">
            Verificar
        </button>
        <button class="btn btn-light w-100" onclick="cerrarModal()">
            Cancelar
        </button>
    </div>
</div>

<style>
.profile-card {
    max-width: 520px;
    background-color: #ffffff;
    border-radius: 22px;
    padding: 40px 35px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.18);
    border: none;
}

.profile-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    color: #2f3e46;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.icon-circle {
    width: 44px;
    height: 44px;
    background-color: #b7e4e0;
    color: #2f3e46;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.profile-img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #b7e4e0;
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
}

.btn-main {
    background-color: #2f3e46;
    color: #ffffff;
    border-radius: 25px;
    padding: 12px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn-main:hover {
    background-color: #354f52;
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(47,62,70,0.35);
}

.preview-container {
    max-width: 100%;
    max-height: 400px;
    display: none;
    margin-top: 15px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 18px rgba(0,0,0,0.18);
}

#image-to-crop {
    max-width: 100%;
    display: block;
}

.custom-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 3000;
}

.modal-box {
    background: #ffffff;
    max-width: 420px;
    margin: 10% auto;
    padding: 35px 30px;
    border-radius: 22px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

.modal-icon {
    width: 60px;
    height: 60px;
    background-color: #f8d7da;
    color: #dc3545;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin: 0 auto 15px auto;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
let cropper;
const imageToCrop = document.getElementById('image-to-crop');
const inputArchivo = document.getElementById('input-archivo');

function mostrarModal() { document.getElementById('modal-pass').style.display = 'block'; }
function cerrarModal() { document.getElementById('modal-pass').style.display = 'none'; }

async function validarPassword() {
    const pass = document.getElementById('confirm-pass').value;
    const response = await fetch("{% url 'usuarios:verificar_pass' %}", {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
        body: JSON.stringify({password: pass})
    });

    const data = await response.json();
    if(data.success) {
        cerrarModal();
        document.getElementById('btn-activar-cambio').style.display = 'none';
        document.getElementById('form-foto').style.display = 'block';
    } else {
        alert("Contraseña incorrecta.");
    }
}

inputArchivo.addEventListener('change', function(e) {
    const files = e.target.files;
    if (files && files.length > 0) {
        const reader = new FileReader();
        reader.onload = function(event) {
            imageToCrop.src = event.target.result;
            document.getElementById('wrapper-crop').style.display = 'block';
            if (cropper) { cropper.destroy(); }
            cropper = new Cropper(imageToCrop, {
                aspectRatio: 1,
                viewMode: 1,
                dragMode: 'move',
                autoCropArea: 1,
            });
        };
        reader.readAsDataURL(files[0]);
    }
});

document.getElementById('form-foto').addEventListener('submit', function() {
    if (cropper) {
        const canvas = cropper.getCroppedCanvas({ width: 500, height: 500 });
        const base64Image = canvas.toDataURL('image/jpeg', 0.9);
        document.getElementById('foto-recortada-data').value = base64Image;
    }
});
</script>

{% endblock %}
