{% extends "home/base.html" %}
{% block contenido %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<style>
    .preview-container {
        max-width: 100%;
        max-height: 400px;
        margin-top: 15px;
        display: none; /* Se muestra solo cuando hay una foto elegida */
    }
    #image-to-crop {
        display: block;
        max-width: 100%;
    }
</style>

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
        <h2 class="text-center">Mi Perfil</h2>

        <div class="text-center mb-4">
            {% if user.foto_perfil %}
                <img src="{{ user.foto_perfil.url }}" id="img-perfil" class="rounded-circle shadow" width="150" height="150" style="object-fit: cover;">
            {% else %}
                <i class="fa-solid fa-circle-user fa-8x text-secondary"></i>
            {% endif %}
        </div>

        <button id="btn-activar-cambio" class="btn btn-primary w-100" onclick="mostrarModal()">
            <i class="fa-solid fa-camera"></i> Cambiar Foto (Requiere Verificación)
        </button>

        <form id="form-foto" method="post" enctype="multipart/form-data" style="display:none;" class="mt-3">
            {% csrf_token %}
            <label class="form-label">Selecciona una imagen:</label>
            <input type="file" id="input-archivo" class="form-control mb-2" accept="image/*" required>

            <div class="preview-container shadow-sm border rounded p-2" id="wrapper-crop">
                <img id="image-to-crop">
            </div>

            <input type="hidden" name="foto_perfil_base64" id="foto-recortada-data">

            <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-success flex-grow-1">Guardar Foto Ajustada</button>
                <button type="button" class="btn btn-secondary" onclick="location.reload()">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<div id="modal-pass" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index: 2000;">
    <div class="modal-content bg-white p-4 mx-auto mt-5" style="max-width:400px; border-radius:15px; border:none; shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <h4 class="fw-bold"><i class="fa-solid fa-lock text-warning"></i> Confirmar Identidad</h4>
        <p class="text-muted">Introduce tu contraseña para habilitar el editor de perfil.</p>
        <input type="password" id="confirm-pass" class="form-control mb-3" placeholder="Tu contraseña actual">
        <button class="btn btn-danger w-100 mb-2" onclick="validarPassword()">Verificar</button>
        <button class="btn btn-light w-100" onclick="cerrarModal()">Cancelar</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
let cropper;
const imageToCrop = document.getElementById('image-to-crop');
const inputArchivo = document.getElementById('input-archivo');

function mostrarModal() { document.getElementById('modal-pass').style.display = 'block'; }
function cerrarModal() { document.getElementById('modal-pass').style.display = 'none'; }

async function validarPassword() {
    const pass = document.getElementById('confirm-pass').value;
    const response = await fetch("{% url 'usuarios:verificar_pass' %}", {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
        body: JSON.stringify({password: pass})
    });

    const data = await response.json();
    if(data.success) {
        cerrarModal();
        document.getElementById('btn-activar-cambio').style.display = 'none';
        document.getElementById('form-foto').style.display = 'block';
    } else {
        alert("Contraseña incorrecta.");
    }
}

// Lógica para detectar el archivo e iniciar el recorte
inputArchivo.addEventListener('change', function(e) {
    const files = e.target.files;
    if (files && files.length > 0) {
        const reader = new FileReader();
        reader.onload = function(event) {
            imageToCrop.src = event.target.result;
            document.getElementById('wrapper-crop').style.display = 'block';

            if (cropper) { cropper.destroy(); }

            // Inicializar el editor de movimiento
            cropper = new Cropper(imageToCrop, {
                aspectRatio: 1, // Foto cuadrada
                viewMode: 1,    // No permite salirse de los bordes de la imagen
                dragMode: 'move', // Permite mover la foto dentro del cuadro
                autoCropArea: 1,
            });
        };
        reader.readAsDataURL(files[0]);
    }
});

// Al dar clic en Guardar, procesamos el recorte
document.getElementById('form-foto').addEventListener('submit', function(e) {
    if (cropper) {
        // Obtenemos la imagen recortada en alta resolución
        const canvas = cropper.getCroppedCanvas({ width: 500, height: 500 });
        const base64Image = canvas.toDataURL('image/jpeg', 0.9);
        document.getElementById('foto-recortada-data').value = base64Image;
    }
});
</script>
{% endblock %}
