{% extends "home/base.html" %}
{% block titulo %}Subir Imagen{% endblock %}

{% block contenido %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0 rounded-4" style="max-width: 520px; width: 100%;">
        <div class="card-header text-center py-4" style="background-color:#1d3557; color:white; border-radius:16px 16px 0 0;">
            <h4 class="fw-bold mb-1">Subir Imagen</h4>
            <p class="mb-0 small">Producto: {{ producto.nombre }}</p>
        </div>

        <div class="card-body p-4" style="background-color:#f8f9fa;">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label fw-semibold" style="color:#1d3557;">
                        Selecciona una imagen
                    </label>
                    <input type="file" name="imagen" accept="image/*" class="form-control form-control-lg" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{% url 'productos:detalle' producto.id %}"
                       class="btn px-4"
                       style="background-color:#6c757d; color:white;">
                        Volver
                    </a>

                    <button type="submit"
                        class="btn px-4"
                        style="background-color:#1d3557; color:white;">
                        Subir Imagen
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
body {
    background-color: #a8dadc;
}

.form-control {
    border-radius: 10px;
}

.btn:hover {
    opacity: 0.9;
}
</style>
{% endblock %}
