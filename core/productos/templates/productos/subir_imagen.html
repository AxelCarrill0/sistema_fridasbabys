{% extends "home/base.html" %}
{% block titulo %}Subir Imagen{% endblock %}

{% block contenido %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-secondary text-white text-center py-3">
                    <h4 class="fw-bold mb-0">Agregar Imagen a: {{ producto.nombre }}</h4>
                </div>
                <div class="card-body bg-light p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Selecciona una imagen:</label>
                            <input type="file" name="imagen" accept="image/*" class="form-control" required>
                        </div>
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary me-2">
                                <i class="fas fa-upload"></i> Subir Imagen
                            </button>
                            <a href="{% url 'productos:detalle' producto.id %}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Volver
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
