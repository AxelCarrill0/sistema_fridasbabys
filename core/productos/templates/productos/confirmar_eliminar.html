{% extends "home/base.html" %}
{% block title %}Confirmar Eliminación{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-body text-center">

                    <h4 class="mb-3 text-danger fw-bold">
                        Confirmar eliminación
                    </h4>

                    <p class="fs-5">
                        ¿Estás seguro de que deseas eliminar el producto:
                    </p>

                    <p class="fw-bold fs-4 text-dark">
                        "{{ producto.nombre }}"
                    </p>

                    <p class="text-muted">
                        Esta acción es permanente y afectará el inventario.
                    </p>

                    <form method="post" action="{% url 'productos:eliminar' producto.pk %}">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3 mt-4">
                            <button type="submit" class="btn btn-danger px-4">
                                Sí, eliminar
                            </button>
                            <a href="{% url 'productos:lista' %}" class="btn btn-outline-secondary px-4">
                                Cancelar
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
