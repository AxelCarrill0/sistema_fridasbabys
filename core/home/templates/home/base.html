<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fridas Babys - {% block titulo %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #d8c3a5;
            min-height: 100vh;
            padding-top: 50px;
        }

        .navbar {
            background-color: rgb(49, 64, 72); /* Mantenemos el color oscuro para la barra superior */
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar-left {
            display: flex;
            align-items: center;
        }

        .logo {
            font-weight: bold;
            font-size: 20px;
            color: white;
            margin-right: 30px;
            text-decoration: none;
        }
        {
            display: none;
        }

        .navbar-right {
            display: flex;
            align-items: center;
        }

        .content-area {

            padding: 20px;
            text-align: center;
        }
        .system-title {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .logout-button {
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            margin-left: 10px;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .logout-button:hover {
            background-color: white;
            color: rgb(49, 64, 72);
        }

    </style>
</head>
<body>

    <div class="navbar">
        <div class="navbar-left">
            <a href="{% url 'home:home' %}" class="logo">Fridas Babys</a>
            <span class="system-title"> - Sistema de Gestión</span>
        </div>

        <div class="navbar-right">
            {% if user.is_authenticated %}
            <a href="{% url 'usuarios:lista' %}" class="logout-button" style="margin-left: 5px;">Usuarios</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-button">Cerrar Sesión</button>
                </form>

            {% else %}
                <a href="{% url 'login' %}" class="logout-button">Iniciar Sesión</a>
                <a href="{% url 'usuarios:registrar_cliente' %}" class="logout-button" style="margin-left: 5px;">Registrarme</a> {% endif %}
        </div>
    </div>

    <div class="content-area">
        {% block contenido %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
