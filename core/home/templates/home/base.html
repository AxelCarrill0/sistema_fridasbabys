<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fridas Babys - {% block titulo %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        /* ESTILOS TEMPORALES */
        body { margin: 0; font-family: Arial, sans-serif; background-color: #9ecfee; }
        .navbar {
            background-color: rgb(49, 64, 72); /* Fondo oscuro */
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }
        .logo {
            font-weight: bold;
            font-size: 20px;
            color: white; /* Corregido para fondo oscuro */
            margin-right: 30px;
            text-decoration: none;
        }
        .nav-link {
            text-decoration: none;
            color: white; /* Corregido para fondo oscuro */
            margin-right: 15px;
            padding: 5px 10px;
        }
        .content-area {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="{% url 'home:home' %}" class="logo">Fridas Babys</a>
        <a href="{% url 'usuarios:lista' %}" class="nav-link">Usuarios</a>
        <a href="{% url 'home:home' %}" class="nav-link">Home</a>

        {% if user.is_authenticated %}
           <form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit">Cerrar sesión</button>
</form>

        {% else %}
            <a href="{% url 'login' %}" class="nav-link">Iniciar Sesión</a>
        {% endif %}
    </div>

    <div class="content-area">
        {% block contenido %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
