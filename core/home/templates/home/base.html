<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fridas Babys - {% block titulo %}{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #d8c3a5;
            min-height: 100vh;
            padding-top: 70px;
        }

        .navbar {
            background-color: rgb(49, 64, 72);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar-left {
            display: flex;
            align-items: center;
        }

        .logo {
            font-weight: bold;
            font-size: 20px;
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .system-title {
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
        }

        .navbar-right {
            display: flex;
            align-items: center;
        }

        .nav-button {
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 12px;
            margin-left: 10px;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .nav-button:hover {
            background-color: white;
            color: rgb(49, 64, 72);
        }

        .user-menu {
            position: relative;
            display: inline-block;
            margin-left: 10px;
        }

        .user-button {
            background-color: transparent;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
        }

        .user-dropdown {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 150px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
            border-radius: 8px;
            z-index: 10;
            text-align: left;
        }

        .user-dropdown a, .user-dropdown button {
            color: rgb(49, 64, 72);
            padding: 10px 15px;
            text-decoration: none;
            display: block;
            width: 100%;
            background: none;
            border: none;
            text-align: left;
        }

        .user-dropdown a:hover, .user-dropdown button:hover {
            background-color: #f0f0f0;
        }

        .user-menu:hover .user-dropdown {
            display: block;
        }

        .content-area {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="navbar-left">
            <a href="{% url 'home:home' %}" class="logo">Fridas Babys</a>
            <span class="system-title">Sistema de Gestión</span>
        </div>

        <div class="navbar-right">
            {% if user.is_authenticated %}
                <a href="{% url 'productos:lista' %}" class="nav-button">Productos</a>

                {% if user.rol == 'admin' %}
                    <a href="{% url 'usuarios:lista' %}" class="nav-button">Usuarios</a>
                {% endif %}

                {% if user.is_staff %}
                    <a href="{% url 'compras:lista' %}" class="nav-button">Compras</a>
                {% endif %}

                <div class="user-menu">
                    <button class="user-button">
                        <i class="fa-solid fa-user"></i> {{ user.username }}
                        <i class="fa-solid fa-caret-down"></i>
                    </button>
                    <div class="user-dropdown">
                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit">Cerrar sesión</button>
                        </form>
                    </div>
                </div>

            {% else %}
                <a href="{% url 'login' %}" class="nav-button">Iniciar Sesión</a>
                <a href="{% url 'usuarios:registrar_cliente' %}" class="nav-button">Registrarme</a>
            {% endif %}
        </div>
    </div>

    <div class="content-area">
        {% block contenido %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
