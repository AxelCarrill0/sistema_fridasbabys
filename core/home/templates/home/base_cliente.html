<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fridas Babys - {% block titulo %}{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #a8dadc;
            min-height: 100vh;
            padding-top: 70px;
        }
        .navbar {
            background-color: rgb(49, 64, 72);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .navbar-left { display: flex; align-items: center; }
        .logo {
            font-weight: bold;
            font-size: 20px;
            color: white;
            text-decoration: none;
        }
        .navbar-right { display: flex; align-items: center; }

        /* Estilo para el Avatar Circular */
        .nav-profile-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffffff;
            margin-right: 10px;
        }

        .user-menu { position: relative; display: inline-block; }
        .user-button {
            background-color: transparent;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
            display: flex;
            align-items: center;
        }
        .user-dropdown {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 180px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
            border-radius: 8px;
            z-index: 10;
            text-align: left;
        }
        .user-dropdown a, .user-dropdown button {
            color: rgb(49, 64, 72);
            padding: 12px 15px;
            text-decoration: none;
            display: block;
            width: 100%;
            background: none;
            border: none;
            text-align: left;
            font-size: 14px;
        }
        .user-dropdown a:hover, .user-dropdown button:hover {
            background-color: #f0f0f0;
            border-radius: 8px;
        }
        .user-menu:hover .user-dropdown { display: block; }

        .dropdown-divider {
            height: 1px;
            margin: 5px 0;
            background-color: #e5e5e5;
        }

        .content-area {
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="navbar-left">
            <a href="{% url 'home:home' %}" class="logo">Fridas Babys</a>
        </div>

        <div class="navbar-right">
            {% if user.is_authenticated %}
                <div class="user-menu">
                    <button class="user-button">
                        {% if user.foto_perfil %}
                            <img src="{{ user.foto_perfil.url }}" class="nav-profile-img">
                        {% else %}
                            <i class="fa-solid fa-circle-user fa-xl me-2"></i>
                        {% endif %}

                        {{ user.username }}
                        <i class="fa-solid fa-caret-down ms-2"></i>
                    </button>
                    <div class="user-dropdown">
                        <a href="{% url 'usuarios:perfil' %}">
                            <i class="fa-solid fa-user-gear me-2"></i> Mi Perfil
                        </a>

                        <div class="dropdown-divider"></div>

                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit">
                                <i class="fa-solid fa-right-from-bracket me-2 text-danger"></i> Cerrar sesión
                            </button>
                        </form>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light me-2">Iniciar Sesión</a>
                <a href="{% url 'usuarios:registrar_cliente' %}" class="btn btn-light">Registrarse</a>
            {% endif %}
        </div>
    </div>

    <div class="content-area">
        {% block contenido %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
